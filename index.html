<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Unit Converter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <h1>Metric/Imperial Unit Conversion</h1>

    <input type="text" id="input-el" value="20" />

    <button id="convert-btn">Convert</button>
  </div>

  <!-- RESULTS -->
  <div class="results">

    <div class="card">
      <h2>Length (Meter/Feet)</h2>
      <p id="length-el"></p>
    </div>

    <div class="card">
      <h2>Volume (Liters/Gallons)</h2>
      <p id="volume-el"></p>
    </div>

    <div class="card">
      <h2>Mass (Kilograms/Pounds)</h2>
      <p id="mass-el"></p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
